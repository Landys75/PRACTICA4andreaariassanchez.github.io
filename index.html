<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuore di Cristallo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        hontainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s forwards;
        }
        button {
            background-color: #ff4d6d;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        button:hover {
            background-color: #e0435f;
            transform: scale(1.05);
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <header {
            background-image: url('imagenes/banner.jpg');
            background-size: cover;
            color: white;
            padding: 50px;
            text-align: center;
        }
        h1 {
            background: linear-gradient(45deg, #ff4d6d, #ffbd44);
            -webkit-background-clip: text;
            color: transparent;
        }
        .product {
            border: 1px solid #ddd;
            margin: 10px;
            padding: 10px;
            text-align: center;
            background-color: white;
            transition: transform 0.3s ease;
        }
        .product:hover {
            transform: scale(1.05);
        }
        .product img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .c1>Cuore di Cristallo</h1>
        <p>Accesorios únicos y personalizados</p>
    </header>
    <div class="container">
        <div class="product">
            <img src="imagenes/pulsera.jpg" alt="Pulsera">
            <h2>Pulsera de Cuentas</h2>
            <p>$50 MXN</p>
            <button>Comprar</button>
        </div>
        <div class="product">
            <img src="imagenes/collar.jpg" alt="Collar">
            <h2>Collar de Cristal</h2>
            <p>$50 MXN</p>
            <button>Comprar</button>
        </div>
        <div class="product">
            <img src="imagenes/accesorio.jpg" alt="Accesorio para celular">
            <h2>Accesorio para Celular</h2>
            <p>$40 MXN</p>
            <button>Comprar</button>
        </div>
    </div>
    <footer>
        <p>Cuore di Cristallo &copy; 2025 - Todos los derechos reservados</p>
    </footer>
</body>
</html>
